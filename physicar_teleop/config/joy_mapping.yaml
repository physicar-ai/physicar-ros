# PhysiCar Joy Teleop default mapping.
#
# These are the *defaults* used when /home/physicar/physicar_ws/userdata/joy_mapping.json is
# absent.  At runtime the user can override any value via the ROS service
# /physicar_joy_teleop/set_mapping or the REST endpoint POST /joy/mapping;
# changes can be persisted by setting save_to_file=true, which writes
# /home/physicar/physicar_ws/userdata/joy_mapping.json.  On next boot the node loads the JSON
# instead of these defaults.
#
# Indexes follow the SDL2 GameController standard layout that ROS2 `joy`
# emits, so the same mapping works for Xbox, PlayStation, Switch Pro, and
# any other controller covered by SDL's built-in DB.
#
#   axes:    0=LX  1=LY  2=LT  3=RX  4=RY  5=RT  6=DPadX  7=DPadY
#   buttons: 0=A   1=B   2=X   3=Y   4=LB  5=RB  6=Back   7=Start
#            8=Guide  9=LStick  10=RStick

physicar_joy_teleop:
  ros__parameters:
    # Output limits
    max_speed: 2.0          # m/s, applied to /teleop/speed
    max_steering: 20.0      # deg, converted to rad before publishing /teleop/steering
    max_pan: 30.0           # deg, converted to rad before publishing /teleop/camera/pan
    max_tilt: 30.0          # deg, converted to rad before publishing /teleop/camera/tilt

    # Axis mapping (SDL standard indexes)
    axis_speed: 1           # left-stick Y (forward = up = positive after invert)
    axis_steering: 0        # left-stick X
    axis_pan: 3             # right-stick X
    axis_tilt: 4            # right-stick Y

    # Inversion (tune so stick-up = forward, stick-up = camera up)
    invert_speed: false
    invert_steering: false
    invert_pan: false
    invert_tilt: false

    # Stick deadzone (already applied by joy_node, kept here for safety)
    deadzone: 0.05

    # Buttons (held = lock + drive)
    deadman_button: 4         # LB — hold to drive (locks /speed,/steering)
    camera_assist_button: 5   # RB — hold to drive camera (locks /camera/pan,/camera/tilt)
    estop_button: 1           # B  — toggle: zero speed and refuse drive
    center_camera_button: 7   # Start — recenter pan/tilt to 0,0

    # Publish rate (Hz)
    rate: 30.0

    # Master enable flag.  Toggle at runtime with
    #   ros2 param set /physicar_joy_teleop enabled false
    # or REST POST /joy/enabled  {"enabled": false}.  When false this node
    # publishes nothing on /speed,/steering,/camera/* and reports
    # drive_engaged/camera_engaged=false in its status, letting other nodes drive.
    enabled: true
