<!DOCTYPE html>
<html lang="ko">
<head>
<script>
  /* PhysiCar extension handshake: tells the wrapper webview this page actually
     rendered. Sent only AFTER the window load event AND a sanity check that
     core.js really executed — right after a Codespace (re)start nginx serves
     /app while FastAPI is still booting, so the document can load with its
     CSS/JS missing. A broken render must NOT be confirmed to the wrapper;
     without the handshake it keeps its spinner and reloads the iframe (~8s)
     until the page comes up healthy. No-op when not embedded. */
  window.addEventListener("load", function () {
    if (typeof detectMode !== "function") return;   // core.js missing → not healthy
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "physicar-app-ready" }, "*");
      }
    } catch (e) { /* not embedded -- ignore */ }
  });

  /* ── PhysiCar session token sharing (physicar-ext bridge) ──
     When the extension pushes the Chat-login session token (pushToken →
     "physicar-token"), it is planted as the "physicar_session" COOKIE. Why a
     cookie:
      - It rides automatically on every same-origin request (new tabs, iframes,
        WS handshakes), so student backends just read request.cookies —
        zero-code token delivery, per browser = per user.
      - localStorage written inside the webview iframe is storage-partitioned
        away from top-level tabs, but cookies are shared (the nginx pc_token
        gate proves this in practice).
     In the iframe (third-party context, always an https tunnel) SameSite=None;
     Secure is mandatory. Also mirrored to localStorage as a fallback for JS in
     the same partition (physicarSession helper). Sign-out (clear) propagates.
     Outside the webview (plain tab) there is no parent — silently a no-op. */
  (function () {
    var SESSION_KEY = "physicar_session";
    var WEEK = 7 * 24 * 3600;  // matches the session token TTL
    function setCookie(token) {
      var attrs = "; Path=/; Max-Age=" + WEEK
        + (location.protocol === "https:" ? "; SameSite=None; Secure" : "; SameSite=Lax");
      try { document.cookie = SESSION_KEY + "=" + encodeURIComponent(token) + attrs; } catch (_) {}
    }
    function clearCookie() {
      var attrs = "; Path=/; Max-Age=0"
        + (location.protocol === "https:" ? "; SameSite=None; Secure" : "; SameSite=Lax");
      try { document.cookie = SESSION_KEY + "=" + attrs; } catch (_) {}
    }
    window.addEventListener("message", function (e) {
      var msg = e.data || {};
      if (msg.type === "physicar-token" && typeof msg.token === "string" && msg.token) {
        setCookie(msg.token);
        try { localStorage.setItem(SESSION_KEY, msg.token); } catch (_) {}
      } else if (msg.type === "physicar-token-clear") {
        clearCookie();
        try { localStorage.removeItem(SESSION_KEY); } catch (_) {}
      }
    });
    try {
      if (window.parent !== window) {
        // always request so a stored token gets refreshed (no reply if chat is closed)
        window.parent.postMessage({ type: "physicar-token-request" }, "*");
      }
    } catch (_) {}
  })();
</script>
<script>
  /* Boot race guard: right after a Codespace (re)start, github.dev port auth
     can 302 CSS/JS subresources to pf-signin while the document itself loads,
     leaving an unstyled page. If any stylesheet/script fails to load, reload
     once auth settles (max 5 attempts, backed off; counter resets on success). */
  (function () {
    var KEY = 'pc-asset-reload';
    window.addEventListener('error', function (e) {
      var t = e.target || {};
      if (t.tagName !== 'LINK' && t.tagName !== 'SCRIPT') return;
      var n = +(sessionStorage.getItem(KEY) || 0);
      if (n >= 5 || window.__pcReloading) return;
      window.__pcReloading = true;
      sessionStorage.setItem(KEY, String(n + 1));
      setTimeout(function () { location.reload(); }, 2000 * (n + 1));
    }, true);
    window.addEventListener('load', function () {
      if (!window.__pcReloading) sessionStorage.removeItem(KEY);
    });
  }());
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHYSICAR App</title>
<link rel="stylesheet" href="/static/css/app.css">
<link rel="stylesheet" href="/static/css/control.css">
<style>
/* ── /app layout — every boundary is a RATIO, so resizing the window keeps
   the exact same composition:
   ┌─────────┬──────────────────────┬─────────┐
   │         │ MyApp VNC DeepRacer  │         │
   │ Control │   (selected iframe)  │ Sensors │
   ├─────────┴──────────────────────┤         │
   │ Simulator (sim mode only)      │         │
   └────────────────────────────────┴─────────┘ */
body{display:flex;flex-direction:row;height:100vh}

/* main : sensors = 5 : 2 by default (drag-adjustable, session only) */
.main{display:flex;flex-direction:column;min-width:0;container-type:size}

.top{flex:58;display:flex;flex-direction:row;min-height:0}

/* Control column — 27% of the main area width by default (drag-adjustable) */
.ctrl-col{width:27%;flex-shrink:0}

/* Vertical divider: Control | Center (drag) */
.vdivider{
  width:6px;cursor:col-resize;background:var(--border);
  flex-shrink:0;position:relative;z-index:10;transition:background .15s;
}
.vdivider:hover,.vdivider.dragging{background:var(--accent)}

/* Horizontal divider: top | Simulator (drag; sim mode only) */
.hdivider{
  height:6px;cursor:row-resize;background:var(--border);
  flex-shrink:0;position:relative;z-index:10;transition:background .15s;
  display:none;
}
.hdivider:hover,.hdivider.dragging{background:var(--accent)}
body.sim-mode .hdivider{display:block}

/* Center: tab bar + selected service iframe */
.center{flex:1;display:flex;flex-direction:column;min-width:0;container-type:inline-size}
.tabbar{
  display:flex;align-items:center;gap:6px;flex-shrink:0;
  padding:8px;background:var(--bg2);border-bottom:1px solid var(--border);
}
.tab{
  padding:5px 14px;border-radius:999px;font-size:13px;font-weight:600;
  color:var(--fg3);background:var(--bg3);border:1px solid var(--border);
  transition:all .15s;white-space:nowrap;
}
.tab:hover{color:var(--fg2);border-color:var(--fg3)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tab-spacer{flex:1}
.tab-open{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:6px;color:var(--fg2);
}
.tab-open:hover{background:var(--bg3);color:var(--fg)}
.tab-open svg{width:16px;height:16px}
.view{flex:1;min-height:0;position:relative;background:#111}
.view iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#111}

/* Simulator row — 42% of the main area height (sim mode only) */
.sim-row{flex:42;display:none;position:relative;background:#111;border-top:1px solid var(--border);min-height:0}
.sim-row iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#111}
body.sim-mode .sim-row{display:block}

/* Focused iframe (clicks/keyboard go there) → accent outline */
.view.focused,.sim-row.focused{box-shadow:inset 0 0 0 2px var(--accent)}

/* ── Divider ── */
.divider{
  width:6px;cursor:col-resize;background:var(--border);
  flex-shrink:0;position:relative;z-index:10;transition:background .15s;
}
.divider:hover,.divider.dragging{background:var(--accent)}

/* ── Right sensor column (inline panel, fixed type sizes) ── */
.right{display:flex;flex-direction:column;min-width:0;flex-shrink:0;background:var(--bg2)}
.right .panel{width:100%;min-width:0;flex:1;border-left:none}
.right .panel-section{padding:12px 8px}
.right .panel-section.panel-section-flush .panel-title{padding:0 8px}
.right .panel-title{font-size:14px;margin-bottom:8px;gap:8px}
.right .panel-title select{font-size:12px;border-radius:5px;padding:2px 4px}
.right .panel-row{font-size:14px;padding:4px 0}
.right .panel-value{font-size:14px}
.right .battery-bar{height:8px;border-radius:4px;margin-top:8px}
.right .panel-restart{padding:12px !important}
.right .btn-restart{font-size:13px;padding:8px 26px;border-radius:8px}
</style>
</head>

<script src="/static/js/core.js"></script>

<script src="/static/js/sensors.js"></script>
<script>
(function(){
  'use strict';

  /* ── Center services (single-select tabs) ── */
  const MONITORS = [
    { id: 'myapp',     label: 'MyApp',     path: '/myapp/'    },
    { id: 'vnc',       label: 'VNC',       path: '/vnc/'      },
    { id: 'deepracer', label: 'DeepRacer', path: '/deepracer' },
  ];
  const KEY = 'app-view';

  /* tab is persisted; all split ratios start at their defaults (session only):
     ratio     — main : sensors (5:2)
     ctrlRatio — control column share of the main width
     simRatio  — simulator row share of the main height */
  let state = { tab: 'myapp', ratio: 5 / 7, ctrlRatio: 0.27, simRatio: 0.42 };
  try {
    const s = JSON.parse(localStorage.getItem(KEY));
    if (s && MONITORS.some(m => m.id === s.tab)) state.tab = s.tab;
  } catch(e){}
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify({ tab: state.tab })); }catch(e){} }

  const main    = document.getElementById('main');
  const right   = document.getElementById('right');
  const divider = document.getElementById('divider');
  const tabbar  = document.getElementById('tabbar');
  const frame   = document.getElementById('view-frame');

  const tabs = {};
  const tabSpacer = tabbar.querySelector('.tab-spacer');
  MONITORS.forEach(m => {
    const b = document.createElement('button');
    b.className = 'tab';
    b.textContent = m.label;
    b.addEventListener('click', () => { state.tab = m.id; save(); render(); });
    tabbar.insertBefore(b, tabSpacer);
    tabs[m.id] = b;
  });

  // Open the selected service in a full browser tab. Inside the VS Code
  // webview the iframe sandbox blocks window.open (returns null) — relay to
  // the extension instead, which opens the system browser via openExternal.
  document.getElementById('btn-open-tab').addEventListener('click', () => {
    const m = MONITORS.find(x => x.id === state.tab);
    if (!m) return;
    // the session token reaches the new tab via the physicar_session cookie (no URL exposure)
    const url = new URL(m.path, location.href).href;
    let w = null;
    try { w = window.open(url, '_blank', 'noopener'); } catch(e){}
    if (!w && window.parent !== window) {
      window.parent.postMessage({ type: 'physicar-open', url }, '*');
    }
  });

  function render(){
    const m = MONITORS.find(x => x.id === state.tab);
    MONITORS.forEach(x => tabs[x.id].classList.toggle('active', x.id === state.tab));
    if (m && frame.getAttribute('src') !== m.path) frame.src = m.path;
  }

  /* ── Split ratios (all ratio-based → window resizes keep proportions;
     all drag-adjustable, deliberately session-only) ── */
  const topEl   = document.querySelector('.top');
  const ctrlCol = document.getElementById('page-control');
  const simRow  = document.getElementById('sim-row');

  function applyRatio(){
    main.style.width  = 'calc(' + (state.ratio * 100).toFixed(2) + '% - 3px)';
    right.style.width = 'calc(' + ((1 - state.ratio) * 100).toFixed(2) + '% - 3px)';
    main.style.flex = 'none';
  }
  function applyCtrlRatio(){
    ctrlCol.style.width = (state.ctrlRatio * 100).toFixed(2) + '%';
  }
  function applySimRatio(){
    topEl.style.flex  = String(((1 - state.simRatio) * 100).toFixed(2));
    simRow.style.flex = String((state.simRatio * 100).toFixed(2));
  }

  /* Generic divider drag: onMove receives the pointer position and updates
     its ratio; iframes are pointer-events-frozen during the drag. */
  function makeDrag(el, onMove){
    let dragging = false;
    function down(e){
      e.preventDefault(); dragging = true;
      el.classList.add('dragging');
      document.querySelectorAll('iframe').forEach(f => f.style.pointerEvents = 'none');
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
      document.addEventListener('touchmove', move, {passive:false});
      document.addEventListener('touchend', up);
    }
    function move(e){
      if(!dragging) return;
      e.preventDefault();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      onMove(cx, cy);
    }
    function up(){
      dragging = false;
      el.classList.remove('dragging');
      document.querySelectorAll('iframe').forEach(f => f.style.pointerEvents = '');
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      document.removeEventListener('touchmove', move);
      document.removeEventListener('touchend', up);
      // ratios are session-only by design — not saved
    }
    el.addEventListener('mousedown', down);
    el.addEventListener('touchstart', down, {passive:false});
  }

  // main | sensors (vertical boundary across the window)
  makeDrag(divider, (cx) => {
    state.ratio = Math.max(0.2, Math.min(0.8, cx / document.body.clientWidth));
    applyRatio();
  });
  // control | center (vertical boundary inside .top)
  makeDrag(document.getElementById('ctrl-divider'), (cx) => {
    const r = topEl.getBoundingClientRect();
    state.ctrlRatio = Math.max(0.12, Math.min(0.55, (cx - r.left) / r.width));
    applyCtrlRatio();
  });
  // top | simulator (horizontal boundary inside .main)
  makeDrag(document.getElementById('sim-divider'), (_cx, cy) => {
    const r = main.getBoundingClientRect();
    state.simRatio = Math.max(0.12, Math.min(0.7, 1 - (cy - r.top) / r.height));
    applySimRatio();
  });

  /* ── Focused-iframe outline (activeElement poll — cross-origin safe) ── */
  (function(){
    let last = null;
    setInterval(() => {
      const ae = document.activeElement;
      const target = (ae && ae.tagName === 'IFRAME') ? ae : null;
      if (target === last) return;
      last = target;
      document.querySelectorAll('.view.focused, .sim-row.focused').forEach(el => el.classList.remove('focused'));
      if (target) {
        const holder = target.closest('.view') || target.closest('.sim-row');
        if (holder) holder.classList.add('focused');
      }
    }, 250);
  })();

  /* ── Control (inline) ── */
  CTRL.init();
  const redrawJoysticks = () => { CTRL._drawJoystick('drive'); CTRL._drawJoystick('cam'); };
  requestAnimationFrame(redrawJoysticks);
  // Redraw whenever the control column changes size (window resize, divider drag)
  new ResizeObserver(() => requestAnimationFrame(redrawJoysticks))
    .observe(document.getElementById('page-control'));

  /* ── Sensors (inline) ── */
  ['cam-res', 'lidar-step', 'lidar-range'].forEach(id => {
    const v = localStorage.getItem(id);
    if (v && $(id)) $(id).value = v;
  });
  startStateStream();
  startLidarStream();
  startCameraStream();

  /* ── Mode: show the simulator row only in sim mode ── */
  (async function(){
    const mode = await detectMode();   // adds body.sim-mode when sim
    if (mode === 'sim') {
      document.getElementById('sim-frame').src = '/sim/';
      document.title = 'PHYSICAR App (SIM)';
    }
  })();

  render();
  applyRatio();
  applyCtrlRatio();
  applySimRatio();
})();
</script>
</body>
</html>
