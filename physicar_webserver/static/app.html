<!DOCTYPE html>
<html lang="ko">
<head>
<script>
  /* PhysiCar extension handshake: tells the wrapper webview this page actually
     rendered. Sent only AFTER the window load event AND a sanity check that
     core.js really executed — right after a Codespace (re)start nginx serves
     /app while FastAPI is still booting, so the document can load with its
     CSS/JS missing. A broken render must NOT be confirmed to the wrapper;
     without the handshake it keeps its spinner and reloads the iframe (~8s)
     until the page comes up healthy. No-op when not embedded. */
  window.addEventListener("load", function () {
    if (typeof detectMode !== "function") return;   // core.js missing → not healthy
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: "physicar-app-ready" }, "*");
      }
    } catch (e) { /* not embedded -- ignore */ }
  });

  /* ── PhysiCar session token sharing (physicar-ext bridge) ──
     When the extension pushes the Chat-login session token (pushToken →
     "physicar-token"), it is planted as the "physicar_session" COOKIE. Why a
     cookie:
      - It rides automatically on every same-origin request (new tabs, iframes,
        WS handshakes), so student backends just read request.cookies —
        zero-code token delivery, per browser = per user.
      - localStorage written inside the webview iframe is storage-partitioned
        away from top-level tabs, but cookies are shared (the nginx pc_token
        gate proves this in practice).
     In the iframe (third-party context, always an https tunnel) SameSite=None;
     Secure is mandatory. Also mirrored to sessionStorage (NOT localStorage —
     a persistent mirror would outlive the session cookie and leak the previous
     user's token on shared PCs) as a fallback for JS in the same partition
     (physicarSession helper). Sign-out (clear) propagates.
     Outside the webview (plain tab) there is no parent — silently a no-op. */
  (function () {
    var SESSION_KEY = "physicar_session";
    // Always a session cookie (no Max-Age — gone when the browser closes).
    // Not persisted on purpose: on a shared PC a previous user's token
    // lingering on /myapp for days outweighs the rare convenience of
    // "reopen myapp directly after a browser restart". Opening the
    // workspace/app makes the panel (bridge) replant the cookie anyway.
    function setCookie(token) {
      var attrs = "; Path=/"
        + (location.protocol === "https:" ? "; SameSite=None; Secure" : "; SameSite=Lax");
      try { document.cookie = SESSION_KEY + "=" + encodeURIComponent(token) + attrs; } catch (_) {}
    }
    function clearCookie() {
      var attrs = "; Path=/; Max-Age=0"
        + (location.protocol === "https:" ? "; SameSite=None; Secure" : "; SameSite=Lax");
      try { document.cookie = SESSION_KEY + "=" + attrs; } catch (_) {}
    }
    window.addEventListener("message", function (e) {
      var msg = e.data || {};
      if (msg.type === "physicar-token" && typeof msg.token === "string" && msg.token) {
        setCookie(msg.token);
        try { sessionStorage.setItem(SESSION_KEY, msg.token); } catch (_) {}
        try { localStorage.removeItem(SESSION_KEY); } catch (_) {}  /* clear legacy persistent mirror */
      } else if (msg.type === "physicar-token-clear") {
        clearCookie();
        try { sessionStorage.removeItem(SESSION_KEY); } catch (_) {}
        try { localStorage.removeItem(SESSION_KEY); } catch (_) {}
      }
    });
    try {
      if (window.parent !== window) {
        // always request so a stored token gets refreshed (no reply if chat is closed)
        window.parent.postMessage({ type: "physicar-token-request" }, "*");
      }
    } catch (_) {}

    /* Cloud sim auto-login: on sim.physicar.ai the gateway's own cookie already
       identifies the user — exchange it for an API session via same-origin
       /__session when we hold no token (standalone tab; the extension bridge
       covers the embedded case). Elsewhere the endpoint doesn't exist →
       non-OK/throw → silently ignored. */
    try {
      var _have = null;
      try {
        _have = /(?:^|;\s*)physicar_session=/.test(document.cookie)
          ? "cookie" : sessionStorage.getItem(SESSION_KEY);
      } catch (_) {}
      if (!_have) {
        fetch("/__session", { method: "POST" })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (d) {
            if (d && d.token) {
              setCookie(d.token);
              try { sessionStorage.setItem(SESSION_KEY, d.token); } catch (_) {}
            }
          })
          .catch(function () {});
      }
    } catch (_) {}
  })();
</script>
<script>
  /* Boot race guard: right after a Codespace (re)start, github.dev port auth
     can 302 CSS/JS subresources to pf-signin while the document itself loads,
     leaving an unstyled page. If any stylesheet/script fails to load, reload
     once auth settles (max 5 attempts, backed off; counter resets on success). */
  (function () {
    var KEY = 'pc-asset-reload';
    window.addEventListener('error', function (e) {
      var t = e.target || {};
      if (t.tagName !== 'LINK' && t.tagName !== 'SCRIPT') return;
      var n = +(sessionStorage.getItem(KEY) || 0);
      if (n >= 5 || window.__pcReloading) return;
      window.__pcReloading = true;
      sessionStorage.setItem(KEY, String(n + 1));
      setTimeout(function () { location.reload(); }, 2000 * (n + 1));
    }, true);
    window.addEventListener('load', function () {
      if (!window.__pcReloading) sessionStorage.removeItem(KEY);
    });
  }());
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHYSICAR App</title>
<link rel="stylesheet" href="/static/css/app.css">
<link rel="stylesheet" href="/static/css/control.css">
<style>
/* ── /app layout — multi-select badge bar + stacked panels:
   ┌──────────────────────────────────┬─────────┐
   │ SIMULATOR CONTROL MYAPP VNC DR   │         │
   ├──────────────────────────────────┤         │
   │ selected panels stacked in that  │ Sensors │
   │ fixed order, each at a fixed     │         │
   │ aspect ratio (vertical scroll)   │         │
   └──────────────────────────────────┴─────────┘ */
body{display:flex;flex-direction:row;height:100vh}

/* main : sensors = 5 : 2 by default (drag-adjustable, session only) */
.main{display:flex;flex-direction:column;min-width:0}

/* Badge bar: multi-select service toggles */
.tabbar{
  display:flex;align-items:center;gap:6px;flex-shrink:0;
  padding:8px;background:var(--bg2);border-bottom:1px solid var(--border);
  overflow-x:auto;
}
.tab{
  padding:5px 14px;border-radius:999px;font-size:13px;font-weight:600;
  color:var(--fg3);background:var(--bg3);border:1px solid var(--border);
  transition:all .15s;white-space:nowrap;flex-shrink:0;
}
.tab:hover{color:var(--fg2);border-color:var(--fg3)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* Stacked panels — fixed aspect ratios, so the stack can outgrow the
   viewport and scrolls vertically */
.stack{
  flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;gap:8px;padding:8px;
}
.stack-panel{
  display:none;flex-direction:column;flex-shrink:0;
  background:#111;border:1px solid var(--border);border-radius:10px;overflow:hidden;
}
.stack-panel.on{display:flex}
#panel-control{background:var(--bg)}

/* Slim identity strip on every panel */
.sp-head{
  height:24px;flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:0 10px;font-size:10px;font-weight:700;letter-spacing:.08em;
  color:var(--fg3);background:var(--bg2);border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;
}

/* The body below the strip carries the EXACT aspect ratio (the strip is
   excluded, so the embedded page gets a true 2:1 / 5:2 / 4:3 viewport) */
.sp-body{position:relative;width:100%}
#panel-simulator .sp-body{aspect-ratio:2/1}
#panel-control .sp-body{aspect-ratio:5/2;min-height:206px}
#panel-myapp .sp-body,#panel-vnc .sp-body{aspect-ratio:4/3}
.sp-body iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#111}
.sp-actions{margin-left:auto;display:flex;gap:2px;align-items:center}
#sim-world-select{
  height:18px;max-width:150px;font-size:10px;font-weight:600;
  color:var(--fg2);background:var(--bg3);border:1px solid var(--border);
  border-radius:5px;padding:0 2px;color-scheme:dark;
}
#sim-world-select option{background:#1c2130;color:#e7e9f0}
.stack-panel.focused #sim-world-select{color:#fff;background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4)}
.sp-btn{
  display:flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:5px;color:var(--fg2);
}
.sp-btn:hover{background:var(--bg3);color:var(--fg)}
.sp-btn svg{width:13px;height:13px}

/* SIMULATOR exists only in sim mode (no /sim/ on real robots) */
body:not(.sim-mode) .tab-sim{display:none}
body:not(.sim-mode) #panel-simulator{display:none}

/* Control fills its panel as a card row: Drive | Look */
#page-control{position:absolute;inset:0;flex-direction:row}

/* Focused (= interactive) card → accent border + lit header strip */
.stack-panel.focused{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.stack-panel.focused .sp-head{background:var(--accent);color:#fff;border-bottom-color:var(--accent)}
.stack-panel.focused .sp-btn{color:rgba(255,255,255,.85)}
.stack-panel.focused .sp-btn:hover{background:rgba(255,255,255,.18);color:#fff}

/* Click-to-interact shield: iframes swallow wheel events, so an inactive
   card is covered by this transparent layer — wheel over it scrolls the
   stack, a click hands focus (and the pointer) to the iframe below */
.sp-shield{position:absolute;inset:0;z-index:4;cursor:pointer;transition:background .15s}
.sp-shield:hover{background:rgba(126,87,194,.07)}
.stack-panel.focused .sp-shield{display:none}

/* Nothing selected */
.stack-empty{display:none;padding:48px 16px;text-align:center;color:var(--fg3);font-size:14px}

/* ── Divider ── */
.divider{
  width:6px;cursor:col-resize;background:var(--border);
  flex-shrink:0;position:relative;z-index:10;transition:background .15s;
}
.divider:hover,.divider.dragging{background:var(--accent)}

/* ── Right sensor column (inline panel, fixed type sizes) ── */
.right{display:flex;flex-direction:column;min-width:0;flex-shrink:0;background:var(--bg2)}
.right .panel{width:100%;min-width:0;flex:1;border-left:none}
.right .panel-section{padding:12px 8px}
.right .panel-section.panel-section-flush .panel-title{padding:0 8px}
.right .panel-title{font-size:14px;margin-bottom:8px;gap:8px}
.right .panel-title select{font-size:12px;border-radius:5px;padding:2px 4px}
.right .panel-row{font-size:14px;padding:4px 0}
.right .panel-value{font-size:14px}
.right .battery-bar{height:8px;border-radius:4px;margin-top:8px}
.right .panel-restart{padding:12px !important}
.right .btn-restart{font-size:13px;padding:8px 26px;border-radius:8px}
</style>
</head>
<body>

<div class="main" id="main">
  <div class="tabbar" id="tabbar"></div>

  <div class="stack" id="stack">
    <!-- SIMULATOR (sim mode only) -->
    <div class="stack-panel" id="panel-simulator">
      <div class="sp-head">SIMULATOR
        <div class="sp-actions">
          <select id="sim-world-select" title="Switch world"></select>
          <button class="sp-btn" id="btn-import-sim" title="Import world">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button class="sp-btn" id="btn-respawn-sim" title="Respawn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </div>
      <div class="sp-body"><iframe id="frame-simulator" title="Simulator" allow="autoplay"></iframe><div class="sp-shield" data-frame="frame-simulator" title="Click to interact"></div></div>
      <input type="file" id="sim-import-input" accept=".tar.gz,.gz" style="display:none">
    </div>

    <!-- MYAPP -->
    <div class="stack-panel" id="panel-myapp">
      <div class="sp-head">MYAPP
        <div class="sp-actions">
          <button class="sp-btn" id="btn-reload-myapp" title="Reload">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
          <button class="sp-btn" id="btn-open-myapp" title="Open in new tab">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          </button>
        </div>
      </div>
      <div class="sp-body"><iframe id="frame-myapp" title="MyApp" allow="autoplay; camera; microphone"></iframe><div class="sp-shield" data-frame="frame-myapp" title="Click to interact"></div></div>
    </div>

    <!-- VNC -->
    <div class="stack-panel" id="panel-vnc">
      <div class="sp-head">VNC</div>
      <div class="sp-body"><iframe id="frame-vnc" title="VNC" scrolling="no" allow="autoplay; camera; microphone"></iframe><div class="sp-shield" data-frame="frame-vnc" title="Click to interact"></div></div>
    </div>

    <!-- CONTROL (inline; id/class kept — control.js gates sending on #page-control.active) -->
    <div class="stack-panel" id="panel-control">
    <div class="sp-head">CONTROL</div>
    <div class="sp-body">
    <div class="ctrl-col" id="page-control">
      <!-- Drive (speed / steering) -->
      <div class="cc">
        <div class="cc-head">Drive</div>
        <div class="ctrl-area-row">
        <div class="ctrl-vslider" title="Max speed (m/s)">
          <span class="ctrl-vslider-val"><strong id="ctrl-max-speed-val">1.0</strong></span>
          <input type="range" id="ctrl-max-speed" min="0.5" max="3.0" step="0.1" value="1.0" oninput="CTRL.setMaxSpeed(this.value)">
          <span class="ctrl-vslider-label">Max</span>
        </div>
        <div class="ctrl-area" id="ctrl-drive-area">
          <div class="ctrl-joystick-wrap" id="ctrl-drive-joy">
            <canvas class="ctrl-joystick" id="ctrl-drive-canvas"></canvas>
          </div>
        </div>
        </div>
        <div class="ctrl-info">
          <span>Speed: <strong id="ctrl-speed">0.00</strong> m/s</span>
          <span>Steer: <strong id="ctrl-steer">0</strong>°</span>
        </div>
      </div>

      <!-- Look (camera pan / tilt) -->
      <div class="cc">
        <div class="cc-head">Look</div>
        <div class="ctrl-area" id="ctrl-cam-area">
          <div class="ctrl-joystick-wrap" id="ctrl-cam-joy">
            <canvas class="ctrl-joystick" id="ctrl-cam-canvas"></canvas>
          </div>
        </div>
        <div class="ctrl-info">
          <span>Pan: <strong id="ctrl-pan">0</strong>°</span>
          <span>Tilt: <strong id="ctrl-tilt">0</strong>°</span>
        </div>
      </div>
    </div>
    </div>
    </div>

    <div class="stack-empty" id="stack-empty">Select a view above</div>
  </div>
</div>

<div class="divider" id="divider"></div>

<!-- Sensors (inline panel) -->
<div class="right" id="right">
  <div class="panel" id="sensor-panel">
    <div class="panel-section panel-section-flush">
      <div class="panel-title">Camera
        <select id="cam-res" onchange="changeCameraRes()">
          <option value="480">480x360</option>
          <option value="320" selected>320x240</option>
          <option value="160">160x120</option>
        </select>
      </div>
      <img class="panel-camera panel-zoomable" id="p-camera" alt="Camera" onclick="openSensorModal('camera')" title="Click to enlarge">
    </div>
    <div class="panel-section panel-section-flush">
      <div class="panel-title">LiDAR
        <select id="lidar-step" onchange="changeLidarStep()">
          <option value="0.5">0.5&deg;</option>
          <option value="1">1&deg;</option>
          <option value="3" selected>3&deg;</option>
          <option value="5">5&deg;</option>
          <option value="10">10&deg;</option>
        </select>
        <select id="lidar-range" onchange="changeLidarRange()">
          <option value="2">2m</option>
          <option value="4" selected>4m</option>
          <option value="8">8m</option>
          <option value="16">16m</option>
        </select>
      </div>
      <canvas class="panel-lidar panel-zoomable" id="p-lidar" onclick="openSensorModal('lidar')" title="Click to enlarge"></canvas>
    </div>
    <div class="panel-section">
      <div class="panel-title">Velocity</div>
      <div class="panel-row"><span class="panel-label">Linear</span><span class="panel-value" id="p-linear">0.0 m/s</span></div>

      <div class="panel-title">Battery</div>

      <div class="battery-bar"><div class="battery-fill" id="p-battery-fill" style="width:0%"></div></div>

    <div class="panel-section panel-restart">

    </div>
  </div>
</div>

<script src="/static/js/core.js"></script>

<script>
(function(){
  'use strict';

  /* ── Stacked service panels (multi-select badges) ──
     Fixed stacking order: SIMULATOR → MYAPP → VNC → CONTROL.
     SIMULATOR is sim-mode only (real robots have no /sim/). */
  const SERVICES = [
    { id: 'simulator', label: 'SIMULATOR', path: '/sim/',     sim: true },
    { id: 'myapp',     label: 'MYAPP',     path: '/myapp/'    },
    { id: 'vnc',       label: 'VNC',       path: '/vnc/'      },
    { id: 'control',   label: 'CONTROL' },
  ];
  // default view per mode (applied after detectMode when nothing is saved)
  const DEFAULT_SEL = { sim: ['simulator', 'control'], real: ['myapp', 'control'] };
  const KEY = 'app-view';

  let simMode = false;
  let userTouched = false;   // tab clicked before mode detection finished

  /* selection is persisted; the main:sensors ratio starts at its default
     (drag-adjustable, deliberately session-only) */
  let ratio = 5 / 7;
  let savedSel = null;
  try {
    const s = JSON.parse(localStorage.getItem(KEY));
    if (s && Array.isArray(s.sel)) savedSel = new Set(s.sel.filter(id => SERVICES.some(m => m.id === id)));
    else if (s && SERVICES.some(m => m.id === s.tab)) savedSel = new Set([s.tab]);   // pre-multiselect schema
  } catch(e){}
  let sel = savedSel || new Set(['control']);   // provisional until detectMode
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify({ sel: [...sel] })); }catch(e){} }

  const main    = document.getElementById('main');
  const right   = document.getElementById('right');
  const divider = document.getElementById('divider');
  const tabbar  = document.getElementById('tabbar');
  const ctrlCol = document.getElementById('page-control');
  const empty   = document.getElementById('stack-empty');

  const tabs = {}, panels = {}, frames = {};
  SERVICES.forEach(m => {
    const b = document.createElement('button');
    b.className = 'tab' + (m.sim ? ' tab-sim' : '');
    b.textContent = m.label;
    b.addEventListener('click', () => {
      userTouched = true;
      sel.has(m.id) ? sel.delete(m.id) : sel.add(m.id);
      save(); render();
    });
    tabbar.appendChild(b);
    tabs[m.id]   = b;
    panels[m.id] = document.getElementById('panel-' + m.id);
    if (m.path) frames[m.id] = document.getElementById('frame-' + m.id);
  });

  // Open MyApp in a full browser tab. Inside the VS Code webview the iframe
  // sandbox blocks window.open (returns null) — relay to the extension
  // instead, which opens the system browser via openExternal.
  document.getElementById('btn-open-myapp').addEventListener('click', () => {
    // the session token reaches the new tab via the physicar_session cookie (no URL exposure)
    const url = new URL('/myapp/', location.href).href;
    let w = null;
    try { w = window.open(url, '_blank', 'noopener'); } catch(e){}
    if (!w && window.parent !== window) {
      window.parent.postMessage({ type: 'physicar-open', url }, '*');
    }
  });

  // Reload MyApp in place (same-origin → keeps the page it navigated to;
  // falls back to re-setting src if the frame is somehow inaccessible)
  document.getElementById('btn-reload-myapp').addEventListener('click', () => {
    const f = document.getElementById('frame-myapp');
    try { f.contentWindow.location.reload(); }
    catch(e) { f.src = f.getAttribute('src'); }
  });

  function render(){
    let any = false;
    SERVICES.forEach(m => {
      const on    = sel.has(m.id);
      const shown = on && (!m.sim || simMode);   // sim tab/panel are display:none outside sim mode
      tabs[m.id].classList.toggle('active', on);
      panels[m.id].classList.toggle('on', on);
      if (m.path) {
        // load on show, unload on hide (frees hidden VNC/sim streams —
        // matches the old single-iframe tab-switch resource profile)
        const f = frames[m.id];
        const src = f.getAttribute('src');
        if (shown) { if (src !== m.path) f.src = m.path; }
        else if (src && src !== 'about:blank') f.src = 'about:blank';
      }
      if (m.id === 'control') ctrlCol.classList.toggle('active', on);   // gates CTRL sending
      if (shown) any = true;
    });
    empty.style.display = any ? 'none' : 'block';
    updateFocus(true);   // control's glow depends on its selection
  }

  /* ── SIMULATOR header controls — call the proven logic of the /sim page
     (same-origin iframe). The /sim toolbar (Respawn/world/Import) hides when
     embedded and this header takes over; upload progress, switch polling and
     reloads are all still done by the sim page's own code. ── */
  (function () {
    const frame = document.getElementById('frame-simulator');
    if (!frame) return;
    const sel = document.getElementById('sim-world-select');
    const impInput = document.getElementById('sim-import-input');
    function simWin() {
      try {
        const w = frame.contentWindow;
        return (w && typeof w.doRespawn === 'function') ? w : null;
      } catch (e) { return null; }
    }
    async function refreshWorlds() {
      try {
        const d = await (await fetch('/sim/api/worlds')).json();
        sel.innerHTML = '';
        (d.worlds || []).forEach(w => {
          const o = document.createElement('option');
          o.value = w.file;
          o.textContent = w.name;
          if (w.name === d.current) o.selected = true;
          sel.appendChild(o);
        });
      } catch (e) { /* sim not up — retried on the next load */ }
    }
    sel.addEventListener('change', () => {
      const w = simWin();
      if (w) w.switchWorld(sel.value);
      else refreshWorlds();   // iframe not loaded — restore the selection
    });
    document.getElementById('btn-respawn-sim').addEventListener('click', () => {
      const w = simWin();
      if (w) w.doRespawn();
    });
    document.getElementById('btn-import-sim').addEventListener('click', () => impInput.click());
    impInput.addEventListener('change', () => {
      const w = simWin();
      if (w && impInput.files[0]) w.handleFile(impInput.files[0]);
      impInput.value = '';
    });
    // After a switch/upload the sim page reloads itself → resync the list
    frame.addEventListener('load', refreshWorlds);
    // A script can also switch the world straight through the API without
    // touching this page — the sim pushes status changes over SSE
    // (EventSource reconnects by itself if sim_api restarts).
    const es = new EventSource('/sim/api/events');
    es.onmessage = (e) => {
      if (document.activeElement === sel) return;   // dropdown in use
      try {
        const d = JSON.parse(e.data);
        const cur = sel.options[sel.selectedIndex];
        if (d.current && (!cur || cur.textContent !== d.current)) refreshWorlds();
      } catch (_) {}
    };
  })();

  /* ── Split ratio: main | sensors (drag-adjustable, session-only) ── */
  function applyRatio(){
    main.style.width  = 'calc(' + (ratio * 100).toFixed(2) + '% - 3px)';
    right.style.width = 'calc(' + ((1 - ratio) * 100).toFixed(2) + '% - 3px)';
    main.style.flex = 'none';
  }

  /* Generic divider drag: onMove receives the pointer position and updates
     its ratio; iframes are pointer-events-frozen during the drag. */
  function makeDrag(el, onMove){
    let dragging = false;
    function down(e){
      e.preventDefault(); dragging = true;
      el.classList.add('dragging');
      document.querySelectorAll('iframe').forEach(f => f.style.pointerEvents = 'none');
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
      document.addEventListener('touchmove', move, {passive:false});
      document.addEventListener('touchend', up);
    }
    function move(e){
      if(!dragging) return;
      e.preventDefault();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      onMove(cx, cy);
    }
    function up(){
      dragging = false;
      el.classList.remove('dragging');
      document.querySelectorAll('iframe').forEach(f => f.style.pointerEvents = '');
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
      document.removeEventListener('touchmove', move);
      document.removeEventListener('touchend', up);
      // ratios are session-only by design — not saved
    }
    el.addEventListener('mousedown', down);
    el.addEventListener('touchstart', down, {passive:false});
  }

  // main | sensors (vertical boundary across the window)
  makeDrag(divider, (cx) => {
    ratio = Math.max(0.2, Math.min(0.8, cx / document.body.clientWidth));
    applyRatio();
  });

  /* ── Click-to-interact cards ──
     .focused on a panel = it owns the pointer/keyboard. For iframe cards
     that means shield hidden + accent border; when NO iframe is focused,
     the keyboard goes to the parent document — i.e. the inline CONTROL
     card — so that card glows instead. Tracked via an activeElement poll
     (cross-origin safe): clicking anywhere in the parent document pulls
     focus off the iframe, which re-arms its shield. */
  let lastFocused = null;
  function updateFocus(force){
    const ae = document.activeElement;
    const target = (ae && ae.tagName === 'IFRAME') ? ae : null;
    // The compare key includes non-iframe activeElements too, so moving
    // between header controls is also detected
    const key = target || ae;
    if (!force && key === lastFocused) return;
    lastFocused = key;
    document.querySelectorAll('.stack-panel.focused').forEach(el => el.classList.remove('focused'));
    if (target) {
      const holder = target.closest('.stack-panel');
      if (holder) holder.classList.add('focused');
    } else if (ae && ae.closest && ae.closest('.stack-panel')) {
      // A panel-header control (world select/import/respawn...) is in use —
      // iframe focus is gone but the active panel stays with that panel
      // (otherwise the CONTROL fallback below moves the outline to the
      // wrong card)
      ae.closest('.stack-panel').classList.add('focused');
    } else if (panels.control.classList.contains('on')) {
      panels.control.classList.add('focused');
    }
  }
  setInterval(() => updateFocus(false), 250);

  document.querySelectorAll('.sp-shield').forEach(sh => {
    sh.addEventListener('click', () => {
      const f = document.getElementById(sh.dataset.frame);
      if (f) f.focus();
      updateFocus(true);   // immediate — don't wait for the poll tick
    });
  });

  // Card header strip also activates its card (control: the click itself
  // already pulled focus off any iframe — just refresh immediately)
  document.querySelectorAll('.stack-panel').forEach(p => {
    p.querySelector('.sp-head').addEventListener('click', (e) => {
      if (e.target.closest('.sp-actions')) return;   // header action controls
      const f = p.querySelector('.sp-body iframe');
      if (f) f.focus();
      updateFocus(true);
    });
  });

  /* ── Control (inline) ── */
  CTRL.init();
  const redrawJoysticks = () => { CTRL._drawJoystick('drive'); CTRL._drawJoystick('cam'); };
  requestAnimationFrame(redrawJoysticks);
  // Redraw whenever the control column changes size (window resize, divider drag)
  new ResizeObserver(() => requestAnimationFrame(redrawJoysticks))
    .observe(document.getElementById('page-control'));

  /* ── Sensors (inline) ── */
  ['cam-res', 'lidar-step', 'lidar-range'].forEach(id => {
    const v = localStorage.getItem(id);
    if (v && $(id)) $(id).value = v;
  });
  startStateStream();
  startLidarStream();
  startCameraStream();

  /* ── Mode: SIMULATOR badge/panel exist only in sim mode ── */
  (async function(){
    const mode = await detectMode();   // adds body.sim-mode when sim
    if (mode === 'sim') {
      simMode = true;
      document.title = 'PHYSICAR App (SIM)';
    }
    if (!savedSel && !userTouched)
      sel = new Set(DEFAULT_SEL[mode === 'sim' ? 'sim' : 'real']);
    render();
  })();

  render();
  applyRatio();
})();
</script>
</body>
</html>
