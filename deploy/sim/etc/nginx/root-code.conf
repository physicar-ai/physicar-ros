# Root (/) → code-server (local sim, NOT Codespaces).
# Linked to /tmp/pc-root.conf by entrypoint.sh when CODESPACE_NAME is unset.
# Included inside the server block of sites-available/physicar.

# Legacy /code URLs redirect to the new root.
location = /code { return 302 /$is_args$args; }
location /code/  { return 302 /$is_args$args; }

# 쿼리 없는 / 의 기본 폴더 열기(주소창 클린) — 2요소 합작:
#   1) 아래 내부 rewrite: code-server 의 서버측 302(주소창에 ?folder 노출)를 막는다.
#   2) entrypoint.sh 의 workbench.js "pc-default-folder" 패치: 워크벤치는 folder 를
#      브라우저 주소창에서만(비동기 시점에) 읽으므로, 번들에 "쿼리 부재 시 기본
#      폴더" 폴백을 심는 것만이 결정론적이다 (주소창 잠깐 조작은 레이스— 실측).
location = / {
    if ($args = "") {
        rewrite ^ /?folder=/home/physicar/physicar_ws break;
    }

    proxy_pass http://code_web;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
}

location / {
    proxy_pass http://code_web;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
}
