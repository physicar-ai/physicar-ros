# Root (/) → code-server (local sim, NOT Codespaces).
# Linked to /tmp/pc-root.conf by entrypoint.sh when CODESPACE_NAME is unset.
# Included inside the server block of sites-available/physicar.

# Legacy /code URLs redirect to the new root.
location = /code { return 302 /$is_args$args; }
location /code/  { return 302 /$is_args$args; }

location = / {
    # Bare page load → open the workspace. Requests WITH a query string
    # (?folder=, ?reconnectionToken= WebSocket, …) must pass through.
    if ($args = "") {
        return 302 /?folder=/home/physicar/physicar_ws;
    }

    proxy_pass http://code_web;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
}

location / {
    proxy_pass http://code_web;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
}
