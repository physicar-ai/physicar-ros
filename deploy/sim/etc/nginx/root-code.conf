# Root (/) → code-server (local sim, NOT Codespaces).
# Linked to /tmp/pc-root.conf by entrypoint.sh when CODESPACE_NAME is unset.
# Included inside the server block of sites-available/physicar.

# Legacy /code URLs redirect to the new root.
location = /code { return 302 /$is_args$args; }
location /code/  { return 302 /$is_args$args; }

# 쿼리 없는 / 에서 기본 폴더를 "주소창 클린"으로 연다. 두 단계가 모두 필요:
#   1) 내부 rewrite 로 ?folder 를 서버측에 심는다 → code-server 의 302(주소창을
#      ?folder=… 로 더럽히는 리다이렉트)를 막고 워크벤치 HTML 을 / 에서 바로 받는다.
#   2) 워크벤치 JS 는 folder 를 브라우저 주소창(location.search)에서만 읽으므로,
#      sub_filter 로 HTML 머리에 스크립트를 주입해 워크벤치가 읽기 전에 잠깐
#      ?folder 를 replaceState 로 심었다가 load 후 / 로 되돌린다.
# (1)만 하면 웰컴 화면(과거 버그), 둘 다 빼면 302 로 주소창에 ?folder 노출.
location = / {
    if ($args = "") {
        rewrite ^ /?folder=/home/physicar/physicar_ws break;
    }

    proxy_pass http://code_web;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;

    # sub_filter 는 압축 응답엔 못 끼어들므로 오리진 압축을 끈다 (이 경로 한정).
    proxy_set_header Accept-Encoding "";
    sub_filter_once on;
    sub_filter '<head>' '<head><script>(function(){if(!location.search){history.replaceState(null,"","?folder=/home/physicar/physicar_ws");addEventListener("load",function(){history.replaceState(null,"","/")})}})()</script>';
}

location / {
    proxy_pass http://code_web;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
}
