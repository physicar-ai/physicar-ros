# PhysiCar origin gate — blocks direct origin access that bypasses our gateway.
#
# The EC2 SG already allows only Cloudflare IP ranges inbound, but that alone
# does not stop a third party from pointing THEIR Cloudflare account at our
# EC2 (traffic still originates from CF ranges). This gate requires a shared
# secret header that only OUR gateway Worker injects, so such proxying gets 403.
#
# STATIC file — never changes. The decision map lives in /tmp/pc-gate.map,
# which entrypoint.sh writes at boot from $PHYSICAR_ORIGIN_GATE_SECRET and
# applies with `nginx -s reload`:
#   secret provisioned (cloud) →  default "deny";  "<secret>" "ok";
#   no secret (localhost / Codespaces / device) →  default "pass";
#
# So the gate is INACTIVE unless the control plane injects a secret — local and
# Codespaces access is never locked out.
map $http_x_physicar_gate $pc_origin_gate {
    include /tmp/pc-gate.map;
}
