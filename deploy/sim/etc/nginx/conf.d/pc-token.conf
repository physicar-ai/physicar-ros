# PhysiCar Studio access-token gate (Codespaces only).
#
# Restricts *.trycloudflare.com access to clients holding the per-session
# token. This file is STATIC — it never changes. The actual token lives in
# /tmp/pc-token.map (a single map entry), which app-browser.sh rewrites
# at runtime and applies with `nginx -s reload`.
#
# /tmp/pc-token.map holds a line like:  "<token>" 1;
# When empty/absent, no token matches, so tunnel traffic is denied while
# non-tunnel hosts (localhost, *.app.github.dev) still bypass the gate.

# The token is a 128-char (512-bit) hex string used as a map key, which exceeds
# nginx's default 64-byte map hash bucket. Bump it so the map can build.
map_hash_bucket_size 256;

# Gate is active only for the public trycloudflare host.
map $host $pc_gate_host {
    default 0;
    "~\.trycloudflare\.com$" 1;
}

# 1 when the request cookie carries the valid token (loaded from /tmp).
map $cookie_pc_token $pc_cookie_ok {
    default 0;
    include /tmp/pc-token.map;
}

# 1 when the ?token= query arg carries the valid token (loaded from /tmp).
map $arg_token $pc_arg_ok {
    default 0;
    include /tmp/pc-token.map;
}

# gate_host + cookie_ok + arg_ok  ->  action
map $pc_gate_host$pc_cookie_ok$pc_arg_ok $pc_action {
    default "pass";   # non-tunnel host -> always pass
    "100"   "deny";   # tunnel, no cookie, no/invalid token
    "101"   "grant";  # tunnel, no cookie, valid token -> set cookie + clean redirect
    "110"   "pass";   # tunnel, valid cookie, no token  -> already authed, serve
    "111"   "grant";  # tunnel, valid cookie + token    -> refresh cookie + strip token from URL
}
